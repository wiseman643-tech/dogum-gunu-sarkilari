<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İsme Özel Doğum Günü Şarkıları 🎂</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                    colors: {
                        soft: {
                            bg: '#fffde7', 
                            pink: '#ff9a9e',
                            dark: '#374151'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #fffde7;
            background-image: linear-gradient(120deg, #fffde7 0%, #fff9c4 100%);
            color: #374151;
            font-family: 'Nunito', sans-serif;
        }
        .section-box {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ff9a9e;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <div class="max-w-4xl w-full mx-auto px-5 py-8 md:py-12">
        
        <!-- Üst Başlık -->
        <div class="text-center mb-10">
            <div class="text-5xl mb-4">🎁</div>
            <h1 class="text-3xl md:text-5xl font-extrabold mb-3 text-gray-800 tracking-tight">İsme Özel Doğum Günü</h1>
            <p class="text-gray-600 text-base md:text-lg font-semibold">İsmini ara, şarkını izle ve sevdiklerinle paylaş! 🎉</p>
        </div>

        <div id="mainContent" class="w-full space-y-8">
            
            <!-- Arama Kutusu -->
            <div class="relative max-w-xl mx-auto">
                <input type="text" id="searchInput" class="w-full pl-6 pr-6 py-4 md:py-5 text-lg md:text-xl rounded-full border-2 border-white bg-white shadow-lg focus:outline-none focus:border-soft-pink transition-all font-bold" placeholder="🔍 Hangi ismi arıyorsun? (Örn: Can)">
            </div>

            <!-- İstek Bölümü -->
            <div class="max-w-xl mx-auto section-box rounded-3xl p-6 md:p-8 shadow-sm">
                <div class="flex items-center gap-3 mb-3">
                    <span class="text-2xl">✍️</span>
                    <h3 class="text-lg md:text-xl font-bold">Aradığın ismi bulamadın mı?</h3>
                </div>
                <p class="text-gray-600 text-sm mb-5">Hemen bize gönder, en kısa sürede listeye ekleyelim!</p>
                
                <form id="requestForm" class="flex flex-col sm:flex-row gap-3">
                    <input type="text" id="requestNameInput" class="flex-1 px-5 py-3 rounded-2xl border-2 border-white bg-white shadow-sm font-bold focus:outline-none focus:border-soft-pink" placeholder="İstediğin ismi yaz..." required>
                    <button type="submit" id="requestSubmitBtn" class="bg-soft-pink hover:bg-pink-400 text-white font-bold py-3 px-8 rounded-2xl shadow-md transition-all active:scale-95">Gönder 🚀</button>
                </form>
                <div id="requestMessage" class="hidden mt-4 text-center font-bold text-sm px-4 py-3 rounded-xl"></div>
            </div>

            <div class="flex items-center gap-4 py-2">
                <div class="h-px flex-1 bg-gray-300"></div>
                <span class="text-gray-400 font-bold text-sm uppercase tracking-widest">İSİM LİSTESİ</span>
                <div class="h-px flex-1 bg-gray-300"></div>
            </div>

            <div id="namesGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6"></div>
        </div>

        <!-- Video Alanı -->
        <div id="videoContainer" class="hidden flex-col items-center mt-2 w-full max-w-3xl mx-auto">
            <button id="backBtn" class="mb-6 self-start bg-white hover:bg-gray-50 text-gray-700 font-bold py-3 px-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-2">⬅️ Geri Dön</button>
            
            <div class="w-full bg-white p-4 md:p-6 rounded-3xl shadow-lg mb-6">
                <h2 id="videoTitle" class="text-xl md:text-3xl font-extrabold mb-5 text-center"></h2>
                <div class="w-full aspect-video bg-black rounded-2xl overflow-hidden shadow-inner">
                    <iframe id="youtubePlayer" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>

            <!-- Gemini AI Mesaj Bölümü -->
            <div class="w-full bg-white/60 p-5 md:p-8 rounded-3xl shadow-sm border border-white backdrop-blur-sm">
                <h3 class="text-lg md:text-xl font-bold text-purple-700 flex items-center gap-2 mb-4">✨ Yapay Zeka ile Mesaj Yazdır</h3>
                <div class="flex flex-col sm:flex-row gap-3 mb-4">
                    <select id="aiToneSelect" class="flex-1 px-4 py-3 rounded-2xl border-2 border-white bg-white font-bold text-gray-700 focus:outline-none">
                        <option value="samimi ve tatlı">Samimi 🥰</option>
                        <option value="komik">Komik 🤣</option>
                        <option value="duygusal">Duygusal 🥺</option>
                        <option value="şiirsel">Şiirsel 📜</option>
                    </select>
                    <button id="generateAiBtn" class="bg-purple-500 hover:bg-purple-600 text-white font-bold py-3 px-6 rounded-2xl transition-all active:scale-95">Mesaj Yaz ✨</button>
                </div>
                <div id="aiResultArea" class="hidden">
                    <div id="aiLoading" class="hidden text-center py-4"><div class="loader"></div></div>
                    <div id="aiMessageContainer" class="hidden relative">
                        <textarea id="aiMessageText" class="w-full h-32 p-4 bg-white rounded-2xl border border-purple-100 text-gray-700 font-medium resize-none focus:outline-none" readonly></textarea>
                        <button id="copyAiMsgBtn" class="absolute bottom-3 right-3 bg-gray-100 hover:bg-gray-200 text-xs font-bold py-2 px-4 rounded-xl">📋 Kopyala</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- BAĞLANTI AYARLARI ---
        // DİKKAT: Aşağıdaki linki SİLİP kendi Google Sheets CSV linkinizi yapıştırın!
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQfaAy-p8OJIW8Z_0vmKmTGXWPp8x10Cxd-bWoYQr8tnEOqj5qbk56ufYf_jnJQSVciDOVKC8G0L6KG/pub?output=csv"; 
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxubSTS_h79FX_L6Lqe8-B70Zgorr9T-uopebqZU0ZryWAg5Y09b9Y4R_69mujchnVW/exec";
        const apiKey = ""; 

        let appData = [
            { id: 1, name: "Can", youtubeId: "dQw4w9WgXcQ" },
            { id: 2, name: "Candan", youtubeId: "jNQXAC9IVRw" }
        ];

        let currentPersonName = "";

        // Elementleri Tanımla
        const searchInput = document.getElementById('searchInput');
        const namesGrid = document.getElementById('namesGrid');
        const mainContent = document.getElementById('mainContent');
        const videoContainer = document.getElementById('videoContainer');
        const youtubePlayer = document.getElementById('youtubePlayer');
        const requestForm = document.getElementById('requestForm');
        const requestSubmitBtn = document.getElementById('requestSubmitBtn');
        const requestMessage = document.getElementById('requestMessage');

        // İsimleri Listele
        function renderNames(data) {
            namesGrid.innerHTML = '';
            if (data.length === 0) {
                namesGrid.innerHTML = `<div class="col-span-full text-center py-10 opacity-50 font-bold">Aradığınız isim bulunamadı 🥺</div>`;
                return;
            }
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-2xl p-5 shadow-card hover:shadow-xl cursor-pointer transition-all transform hover:-translate-y-1 active:scale-95 text-center flex flex-col items-center gap-3 border border-white';
                card.onclick = () => { window.location.hash = item.name; };
                card.innerHTML = `
                    <h3 class="text-lg font-extrabold text-gray-800 capitalize w-full truncate">${item.name}</h3>
                    <span class="bg-red-50 text-red-600 text-xs font-bold px-4 py-2 rounded-full flex items-center">
                        <svg class="w-3.5 h-3.5 mr-2" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                        İzle
                    </span>
                `;
                namesGrid.appendChild(card);
            });
        }

        // Arama İşlemi
        searchInput.oninput = (e) => {
            const term = e.target.value.toLocaleLowerCase('tr-TR');
            renderNames(appData.filter(x => x.name.toLocaleLowerCase('tr-TR').includes(term)));
        };

        // İstek Gönderme (Sheet2'ye)
        requestForm.onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('requestNameInput').value.trim();
            requestSubmitBtn.disabled = true;
            requestSubmitBtn.textContent = "Gönderiliyor...";

            try {
                await fetch(APPS_SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', // CORS hatalarını önlemek için
                    body: new URLSearchParams({ 'isim': name }) 
                });
                requestMessage.textContent = `"${name}" isteği başarıyla iletildi! 🥳`;
                requestMessage.className = "mt-4 text-center font-bold text-sm px-4 py-3 rounded-xl bg-green-100 text-green-700";
                requestMessage.classList.remove('hidden');
                document.getElementById('requestNameInput').value = "";
            } catch (err) {
                requestMessage.textContent = "Bağlantı hatası oluştu!";
                requestMessage.className = "mt-4 text-center font-bold text-sm px-4 py-3 rounded-xl bg-red-100 text-red-700";
                requestMessage.classList.remove('hidden');
            }
            requestSubmitBtn.disabled = false;
            requestSubmitBtn.textContent = "Gönder 🚀";
        };

        // Gemini AI Mesaj Yazma
        document.getElementById('generateAiBtn').onclick = async () => {
            const tone = document.getElementById('aiToneSelect').value;
            const prompt = `${currentPersonName} için ${tone} bir doğum günü kutlama mesajı yaz. Kısa ve emojili olsun. Sadece mesajı ver.`;
            const area = document.getElementById('aiResultArea');
            const loading = document.getElementById('aiLoading');
            const container = document.getElementById('aiMessageContainer');
            
            area.classList.remove('hidden');
            loading.classList.remove('hidden');
            container.classList.add('hidden');

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const json = await res.json();
                document.getElementById('aiMessageText').value = json.candidates[0].content.parts[0].text.trim();
                loading.classList.add('hidden');
                container.classList.remove('hidden');
            } catch (e) {
                loading.classList.add('hidden');
                container.classList.remove('hidden');
                document.getElementById('aiMessageText').value = "Mesaj oluşturulamadı, lütfen tekrar dene.";
            }
        };

        document.getElementById('copyAiMsgBtn').onclick = () => {
            const text = document.getElementById('aiMessageText');
            text.select();
            document.execCommand('copy');
            document.getElementById('copyAiMsgBtn').textContent = "✅ Kopyalandı";
            setTimeout(() => { document.getElementById('copyAiMsgBtn').textContent = "📋 Kopyala"; }, 2000);
        };

        // URL Değişimi Takibi
        function checkHash() {
            const hash = decodeURIComponent(window.location.hash.substring(1));
            document.getElementById('aiResultArea').classList.add('hidden');
            if (hash) {
                const p = appData.find(x => x.name.toLocaleLowerCase('tr-TR') === hash.toLocaleLowerCase('tr-TR'));
                if (p) {
                    currentPersonName = p.name;
                    mainContent.classList.add('hidden');
                    videoContainer.classList.remove('hidden');
                    videoContainer.classList.add('flex');
                    document.getElementById('videoTitle').innerHTML = `İyi ki doğdun <span class="text-pink-500">${p.name}</span>! 🎂`;
                    youtubePlayer.src = `https://www.youtube.com/embed/${p.youtubeId}?autoplay=1`;
                    window.scrollTo(0,0);
                }
            } else {
                mainContent.classList.remove('hidden');
                videoContainer.classList.add('hidden');
                youtubePlayer.src = '';
            }
        }

        window.onhashchange = checkHash;
        document.getElementById('backBtn').onclick = () => window.location.hash = '';

        async function init() {
            if (SHEET_CSV_URL.includes("docs.google.com")) {
                try {
                    const r = await fetch(SHEET_CSV_URL);
                    const t = await r.text();
                    const lines = t.split('\n').slice(1);
                    const freshData = [];
                    lines.forEach((l, i) => {
                        // Türkçe Google Sheets ayarlarında CSV ayırıcısı virgül (,) yerine noktalı virgül (;) olabilir. İkisini de destekliyoruz:
                        const separator = l.includes(';') ? ';' : ',';
                        const cols = l.split(separator);
                        
                        if (cols.length >= 2) {
                            let name = cols[0].replace(/"/g, '').trim(); // Olası tırnak işaretlerini temizle
                            let id = cols[1].replace(/"/g, '').trim();
                            
                            if (name && id) {
                                if(id.includes('v=')) id = id.split('v=')[1].split('&')[0];
                                else if(id.includes('youtu.be/')) id = id.split('youtu.be/')[1].split('?')[0];
                                freshData.push({ id: i, name: name, youtubeId: id });
                            }
                        }
                    });
                    if (freshData.length > 0) appData = freshData;
                } catch(e) {
                    console.error("Veri çekme hatası:", e);
                }
            }
            renderNames(appData);
            checkHash();
        }
        init();
    </script>
</body>
</html>
